"$schema" = 'https://starship.rs/config-schema.json'

# prettiest — Catppuccin Starship prompt.
# Active flavor is set by `prettiest theme <flavor>` (it rewrites the line below).
palette = "catppuccin_mocha"

format = """
[](surface0)\
$os\
$username\
[](bg:peach fg:surface0)\
$directory\
[](fg:peach bg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$nodejs$python$rust$golang$java\
[](fg:teal bg:surface0)\
$time\
[ ](fg:surface0)\
$line_break$character"""

[directory]
style = "fg:crust bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""
"Developer" = "󰲋"

[git_branch]
symbol = ""
style = "fg:crust bg:green"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "fg:crust bg:green"
format = "[$all_status$ahead_behind ]($style)"

[nodejs]
symbol = ""
style = "fg:crust bg:teal"
format = "[ $symbol $version ]($style)"
[python]
symbol = ""
style = "fg:crust bg:teal"
format = "[ $symbol $version ]($style)"
[rust]
symbol = ""
style = "fg:crust bg:teal"
format = "[ $symbol $version ]($style)"
[golang]
symbol = ""
style = "fg:crust bg:teal"
format = "[ $symbol $version ]($style)"
[java]
symbol = ""
style = "fg:crust bg:teal"
format = "[ $symbol $version ]($style)"

[time]
disabled = false
time_format = "%R"
style = "fg:text bg:surface0"
format = "[  $time ]($style)"

[username]
show_always = false
style_user = "fg:text bg:surface0"
style_root = "fg:red bg:surface0"
format = "[ $user ]($style)"

[os]
disabled = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

