"$schema" = 'https://starship.rs/config-schema.json'

# prettiest — plain (no-powerline) full-path prompt.
# Colorway is set by `prettiest theme <name>` (rewrites the line below):
#   catppuccin · gruvbox · tokyonight · mono   (matches system-hud's set)
palette = "catppuccin"

format = """
$directory\
$git_branch\
$git_status\
$nodejs$python$rust$golang$java\
$cmd_duration\
$line_break$character"""

[directory]
truncation_length = 0          # full path
truncate_to_repo = false
style = "bold fg:dir"
format = "[$path]($style) "
read_only = " "
read_only_style = "fg:err"

[git_branch]
symbol = " "
style = "fg:git"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:accent"
format = "([$all_status$ahead_behind]($style) )"

[cmd_duration]
min_time = 2000
style = "fg:muted"
format = "[ $duration]($style) "

[nodejs]
symbol = " "
style = "fg:lang"
format = "[$symbol$version]($style) "
[python]
symbol = " "
style = "fg:lang"
format = "[$symbol$version]($style) "
[rust]
symbol = " "
style = "fg:lang"
format = "[$symbol$version]($style) "
[golang]
symbol = " "
style = "fg:lang"
format = "[$symbol$version]($style) "
[java]
symbol = " "
style = "fg:lang"
format = "[$symbol$version]($style) "

[character]
success_symbol = "[❯](bold fg:git)"
error_symbol = "[❯](bold fg:err)"
vimcmd_symbol = "[❮](bold fg:git)"

# ---- colorways (semantic keys: dir git accent lang muted err text) ----
[palettes.catppuccin]   # Catppuccin Mocha
dir = "#cba6f7"
git = "#a6e3a1"
accent = "#fab387"
lang = "#94e2d5"
muted = "#6c7086"
err = "#f38ba8"
text = "#cdd6f4"

[palettes.gruvbox]      # Gruvbox dark
dir = "#d3869b"
git = "#b8bb26"
accent = "#fe8019"
lang = "#8ec07c"
muted = "#928374"
err = "#fb4934"
text = "#ebdbb2"

[palettes.tokyonight]
dir = "#bb9af7"
git = "#9ece6a"
accent = "#ff9e64"
lang = "#7dcfff"
muted = "#565f89"
err = "#f7768e"
text = "#c0caf5"

[palettes.mono]         # grayscale; red kept for errors
dir = "#ffffff"
git = "#b8b8b8"
accent = "#8a8a8a"
lang = "#a8a8a8"
muted = "#6a6a6a"
err = "#d75f5f"
text = "#cccccc"
